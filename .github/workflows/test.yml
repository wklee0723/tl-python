name: Run Tests with Allure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TWELVELABS_API_KEY: ${{ secrets.TWELVELABS_API_KEY }}
      TWELVELABS_INDEX_ID: ${{ secrets.TWELVELABS_INDEX_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install allure-pytest  # Allure 라이브러리 추가 설치

      - name: Run tests with Allure
        # --alluredir=allure-results 옵션을 추가하여 테스트 결과를 저장합니다.
        # 테스트가 실패해도 리포트를 뽑아야 하므로 continue-on-error를 사용하거나 
        # 아래 단계에서 always()를 사용합니다.
        run: pytest -s -v --alluredir=allure-results
        continue-on-error: true

      - name: Get Allure history
        # 리포트에 트렌드(과거 기록)를 남기고 싶다면 이전 리포트 기록을 체크아웃합니다.
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report Action
        # Allure 결과를 기반으로 HTML 리포트를 생성합니다.
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy report to Github Pages
        # 생성된 리포트를 GitHub Pages(gh-pages 브랜치)에 배포합니다.
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history